<style>

  header {

  .graph-wrap {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
    position: relative;
  }

  /* -------- SVG CANVAS -------- */
  svg.concept-map {
    width: 100%;
    height: auto;
    display: block;
  }

  /* -------- LEGEND -------- */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    justify-content: center;
    padding: 20px 20px 40px;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: .8rem;
    color: #CBD5E1;
  }
  .legend-dot {
    width: 14px; height: 14px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  /* -------- NODE TOOLTIPS -------- */
  .node-group { cursor: pointer; }
  .node-group:hover .node-card { filter: brightness(1.2); }
  .node-group .tooltip {
    opacity: 0;
    transition: opacity .2s;
    pointer-events: none;
  }
  .node-group:hover .tooltip { opacity: 1; }
</style>
